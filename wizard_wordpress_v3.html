<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body.wz-active{font-family:Georgia,serif;color:#1a1a18}
.wz-wrap{max-width:680px;margin:0 auto;padding-top:2rem}

.wz-rgroup{display:flex;flex-direction:column;gap:8px}
.wz-ropt{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1px solid #e5e3de;border-radius:10px;cursor:pointer;transition:all .15s;background:#faf9f7}

.wz-ortile{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;cursor:pointer;background:#fff;transition:all .15s;user-select:none}

.wz-ortile.selected .wz-orchk svg{display:block}

.wz-sitcard{border:1px solid #e5e3de;border-radius:10px;overflow:hidden}

.wz-sitcard.selected .wz-sitchk svg{display:block}

.wz-sitcard.open .wz-sittoggle{transform:rotate(45deg)}
.wz-sitbody{display:none;padding:0 14px 14px 44px}
.wz-sitcard.open .wz-sitbody{display:block}
.wz-sitdesc{font-size:13px;color:#888;line-height:1.6;margin-bottom:10px;font-family:sans-serif}

.wz-cname{font-size:14px;font-weight:600;color:#1a1a18;font-family:sans-serif}

.wz-badge.opt{background:#f0ede8;color:#999}
.wz-ccard{border:1px solid #e5e3de;border-radius:10px;padding:1rem;background:#faf9f7}

.wz-vrow.checked{border-color:#0F6E56;background:#f0faf6}

.wz-nssub{font-size:12px;color:#aaa;margin-top:2px;font-family:sans-serif}

(function(){
var CHK = '<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var cur = 0, TOTAL = 5;
var lang = 'de';
var T = WZ_TRANSLATIONS[lang];

function detectLang() {
  var bl = (navigator.language || navigator.userLanguage || 'de').toLowerCase();
  if (bl.startsWith('fr')) return 'fr';
  if (bl.startsWith('en')) return 'en';
  return 'de';
}

function setLang(l) {
  lang = l;
  T = WZ_TRANSLATIONS[lang];
  document.querySelectorAll('.wz-lang-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.lang === l);
  });
  cur = 0;
  render();
}

document.querySelectorAll('.wz-lang-btn').forEach(function(b){
  b.addEventListener('click', function(){ setLang(b.dataset.lang); });
});

function el(tag, cls, html) {
  var d = document.createElement(tag);
  if (cls) d.className = cls;
  if (html) d.innerHTML = html;
  return d;
}
function q(sel, ctx) { return (ctx||document).querySelector(sel); }
function qa(sel, ctx) { return (ctx||document).querySelectorAll(sel); }

function renderProgress() {
  var p = document.getElementById('wz-progress');
  p.innerHTML = '';
  for (var i = 0; i < TOTAL; i++) {
    if (i > 0) p.appendChild(el('div', 'wz-connector' + (i <= cur ? ' done' : '')));
    var wrap = el('div', 'wz-dot-wrap');
    wrap.dataset.step = i;
    var dot = el('div', 'wz-dot' + (i < cur ? ' done' : i === cur ? ' active' : ''));
    dot.textContent = i < cur ? '\u2713' : (i+1);
    var lbl = el('div', 'wz-step-label' + (i === cur ? ' active' : ''));
    lbl.textContent = T.labels[i];
    wrap.appendChild(dot); wrap.appendChild(lbl);
    wrap.addEventListener('click', (function(idx){ return function(){ if(idx<=cur){cur=idx;render();} }; })(i));
    p.appendChild(wrap);
  }
}

function mkRopt(name, val, title, sub) {
  var lbl = el('label', 'wz-ropt'); lbl.dataset.group = name;
  var inp = document.createElement('input'); inp.type='radio'; inp.name=name; inp.value=val;
  var div = el('div');
  var rl = el('div','wz-rl'); rl.textContent = title;
  var rs = el('div','wz-rs'); rs.textContent = sub;
  div.appendChild(rl); div.appendChild(rs);
  lbl.appendChild(inp); lbl.appendChild(div);
  return lbl;
}

function step1() {
  var f = el('div','wz-fields');
  var r1 = el('div','wz-row');
  var fn = el('div','wz-field'); fn.innerHTML = '<label>'+T.firstname+'</label><input type="text" placeholder="'+T.firstname_ph+'"/>';
  var ln = el('div','wz-field'); ln.innerHTML = '<label>'+T.lastname+'</label><input type="text" placeholder="'+T.lastname_ph+'"/>';
  r1.appendChild(fn); r1.appendChild(ln);
  var r2 = el('div','wz-row');
  var bd = el('div','wz-field'); bd.innerHTML = '<label>'+T.birthdate+'</label><input type="date"/>';
  var kt = el('div','wz-field');
  kt.innerHTML = '<label>'+T.canton_label+'</label><select>'+T.cantons.map(function(c){return '<option>'+c+'</option>';}).join('')+'</select>';
  r2.appendChild(bd); r2.appendChild(kt);
  var em = el('div','wz-field'); em.innerHTML = '<label>'+T.email_label+'</label><input type="email" placeholder="'+T.email_ph+'"/><span class="wz-hint">'+T.email_hint+'</span>';
  f.appendChild(r1); f.appendChild(r2); f.appendChild(em);
  return f;
}

function step2() {
  var wrap = el('div');
  var organs = T.organs;
  var sl1 = el('div','wz-slabel'); sl1.textContent = T.sl1; wrap.appendChild(sl1);
  var sh1 = el('div','wz-shint'); sh1.textContent = T.sh1; wrap.appendChild(sh1);

  wrap.appendChild(el('div','wz-divider'));

  var rg2 = el('div','wz-rgroup');
  T.pain_opts.forEach(function(o){ rg2.appendChild(mkRopt('pain',o[0],o[1],o[2])); });
  wrap.appendChild(rg2);

  var sl3 = el('div','wz-slabel'); sl3.textContent = T.sl3; wrap.appendChild(sl3);
  var sh3 = el('div','wz-shint'); sh3.textContent = T.sh3; wrap.appendChild(sh3);
  var rg3 = el('div','wz-rgroup');
  var bestLbl = el('label','wz-ropt'); bestLbl.dataset.group='organ';
  var bestInp = document.createElement('input'); bestInp.type='radio'; bestInp.name='organ'; bestInp.value='bestimmte';

  organs.forEach(function(n){
    var tile = el('div','wz-ortile');

    var nm = el('span','wz-orname'); nm.textContent = n;
    tile.appendChild(chk); tile.appendChild(nm);
    tile.addEventListener('click', function(e){ e.stopPropagation(); tile.classList.toggle('selected'); });
    grid.appendChild(tile);
  });
  T.organ_opts.forEach(function(o){
    if(o[0]==='bestimmte'){
      var rl=el('div','wz-rl'); rl.textContent=o[1];
      var rs=el('div','wz-rs'); rs.textContent=o[2];
      bestDiv.appendChild(rl); bestDiv.appendChild(rs); bestDiv.appendChild(grid);
      bestLbl.appendChild(bestInp); bestLbl.appendChild(bestDiv);
      rg3.appendChild(bestLbl);
    } else {
      rg3.appendChild(mkRopt('organ',o[0],o[1],o[2]));
    }
  });
  wrap.appendChild(rg3);

function step3() {

    var opts = el('div','wz-sitopts');

function mkDwRow(id, label, sub, isNein){

  var rs=el('div','wz-dwrs'); rs.textContent=sub;
  div.appendChild(rl); div.appendChild(rs);
  row.appendChild(chk); row.appendChild(div);
  row.addEventListener('click',function(){
    if(isNein){
      var was=row.classList.contains('checked');
      row.classList.remove('checked');
      var d1=document.getElementById('wz-dw1'),d2=document.getElementById('wz-dw2');
      if(d1)d1.classList.remove('checked'); if(d2)d2.classList.remove('checked');
      if(!was)row.classList.add('checked');
    } else {
      var nein=document.getElementById('wz-dw3');
      if(nein)nein.classList.remove('checked');
      row.classList.toggle('checked');
    }
  });
  return row;
}

function bindRadios(ctx){
  qa('.wz-ropt',ctx).forEach(function(o){
    o.addEventListener('click',function(){
      var g=o.dataset.group;
      qa('[data-group="'+g+'"]',ctx).forEach(function(x){x.classList.remove('selected');var inp=x.querySelector('input[type=radio]');if(inp)inp.checked=false;});
      o.classList.add('selected');
      var inp=o.querySelector('input[type=radio]');if(inp)inp.checked=true;
      var grid=document.getElementById('wz-orgrid');
      if(grid&&g==='organ')grid.classList.toggle('visible',inp&&inp.value==='bestimmte');
    });
  });
}

function scrollToTop(){
  var wrap=document.getElementById('wz-progress');
  if(wrap){
    var top=wrap.getBoundingClientRect().top+window.pageYOffset-140;
    window.scrollTo({top:top,behavior:'smooth'});
  }
}

function showError(msg){
  var existing=document.getElementById('wz-error');
  if(existing)existing.remove();
  var err=el('div','');
  err.id='wz-error';
  err.style.cssText='background:#FCEBEB;border:1px solid #E24B4A;border-radius:8px;padding:10px 14px;margin-top:12px;font-size:13px;color:#A32D2D;font-family:sans-serif;line-height:1.5;';
  err.textContent=msg;
  var nav=document.querySelector('.wz-nav');
  if(nav)nav.parentNode.insertBefore(err,nav);
  err.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function validateStep(step){
  var panel=document.getElementById('wz-content');
  if(step===0){
    var inputs=panel.querySelectorAll('input[type=text],input[type=date]');
    for(var i=0;i<inputs.length;i++){
      if(!inputs[i].value.trim()){showError(T.err_required);inputs[i].focus();inputs[i].style.borderColor='#E24B4A';return false;}
      inputs[i].style.borderColor='';
    }
    var email=panel.querySelector('input[type=email]');
    if(email&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)){showError(T.err_email);email.focus();email.style.borderColor='#E24B4A';return false;}
  }
  if(step===1){
    var groups=[['life',T.field_life],['pain',T.field_pain],['organ',T.field_organ]];
    for(var g=0;g<groups.length;g++){
      var checked=panel.querySelector('input[name="'+groups[g][0]+'"]:checked');
      if(!checked){showError(T.err_selection+groups[g][1]);return false;}
      if(checked.value==='bestimmte'&&!panel.querySelector('.wz-ortile.selected')){showError(T.err_organ);return false;}
    }
  }
  if(step===3){
    var vp1=panel.querySelector('.wz-cblock input[type=text]');
    var vp1email=panel.querySelector('.wz-cblock input[type=email]');
    if(!vp1||!vp1.value.trim()||!vp1email||!vp1email.value.trim()){showError(T.err_vp1);return false;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(vp1email.value)){showError(T.err_vp1_email);vp1email.style.borderColor='#E24B4A';return false;}
  }
  return true;
}

function render(){
  renderProgress();
  if(cur===TOTAL){renderDone();return;}
  var content=document.getElementById('wz-content');
  content.innerHTML='';
  var panel=el('div','wz-panel');
  var num=el('div','wz-num'); num.textContent='Schritt '+(cur+1)+' / '+TOTAL;
  var title=el('div','wz-title'); title.textContent=T.titles[cur];
  var desc=el('div','wz-desc'); desc.textContent=T.descs[cur];
  panel.appendChild(num); panel.appendChild(title); panel.appendChild(desc);
  var body=[step1,step2,step3,step4,step5][cur]();
  panel.appendChild(body);
  bindRadios(panel);
  var nav=el('div','wz-nav');
  if(cur>0){
    var back=el('button','wz-back'); back.textContent=T.btn_back;
    back.addEventListener('click',function(){cur--;render();scrollToTop();});
    nav.appendChild(back);
  } else { nav.appendChild(el('span')); }
  if(cur<TOTAL-1){
    var next=el('button','wz-next'); next.textContent=T.btn_next;
    next.addEventListener('click',function(){
      var err=document.getElementById('wz-error');if(err)err.remove();
      if(!validateStep(cur))return;
      cur++;render();scrollToTop();
    });
    nav.appendChild(next);
  } else {
    var sw=el('div');
    var submit=el('button','wz-submit'); submit.id='wz-submit'; submit.textContent=T.btn_submit;
    submit.addEventListener('click',function(){if(submit.classList.contains('ready')){cur=TOTAL;render();}});
    var hint=el('div','wz-submit-hint'); hint.id='wz-submit-hint'; hint.textContent=T.submit_hint;
    sw.appendChild(submit); sw.appendChild(hint);
    nav.appendChild(sw);
  }
  panel.appendChild(nav);
  content.appendChild(panel);
}

setLang(detectLang());
